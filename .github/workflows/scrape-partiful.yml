name: Scrape Partiful Events

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Discover new events from AZ Commerce calendar
        run: node scripts/discover-events.mjs

      - name: Run Partiful scraper
        run: node scripts/scrape-partiful.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet client/src/data/events.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/data/events.json
          git commit -m "chore: auto-update event data from Partiful [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git pull --rebase
          git push
                - name: Sync event data to Manus site
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Syncing updated events.json to Manus..."
          HTTP_STATUS=$(curl -s -o /tmp/sync-response.json -w "%{http_code}" \
            -X POST "https://aztechweek.manus.space/api/sync-events" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.MANUS_WEBHOOK_SECRET }}" \
            --data-binary @client/src/data/events.json \
            --max-time 30 )
          echo "Response status: $HTTP_STATUS"
          cat /tmp/sync-response.json
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Warning: Sync to Manus failed with status $HTTP_STATUS (non-blocking)"
          else
            echo "Successfully synced to Manus!"
          fi

